# ============================================================
# render.yaml — Render.com deployment configuration
# Deploy all three services: PostgreSQL, Backend, Frontend
# ============================================================

databases:
  - name: readable-db
    databaseName: readable
    user: readable_user
    plan: free                   # Render free-tier PostgreSQL (90 days)
    region: oregon

services:
  # ── Backend API ───────────────────────────────────────────
  - type: web
    name: readable-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: readable-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true           # Render auto-generates a secure random value
      - key: FRONTEND_URL
        value: https://readable-frontend.onrender.com
    healthCheckPath: /health
    autoDeploy: true

  # ── Frontend (Static Site) ────────────────────────────────
  # Option A: Static site (recommended — faster, free CDN)
  - type: web
    name: readable-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    region: oregon
    envVars:
      - key: VITE_API_URL
        value: https://readable-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ============================================================
# DEPLOYMENT STEPS:
# 1. Push this repo to GitHub
# 2. Go to https://dashboard.render.com
# 3. Click "New" → "Blueprint"
# 4. Connect your GitHub repo
# 5. Render will auto-detect render.yaml and create all services
# 6. After deploy, run migrations:
#    → Go to readable-backend → Shell → node db/migrations/run.js
#    → Then: node db/seeds/run.js
# ============================================================
