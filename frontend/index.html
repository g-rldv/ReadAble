<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Browser tab favicon — circular via canvas -->
    <link rel="icon" type="image/png" href="/readablelogowhite.png" id="favicon-link" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReadAble - Interactive Reading Comprehension for Everyone" />
    <!-- Google Fonts: Fredoka One (display) + Nunito (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#60B8F5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ReadAble" />
    <link rel="apple-touch-icon" href="/readablelogowhite.png" />
    
    <title>ReadAble</title>
    
    <script>
      // Renders the logo PNG onto a canvas with circular clipping,
      // then sets it as the favicon so the browser tab shows a circle.
      (function () {
        var SIZE = 64;

        function makeFaviconUrl(imgSrc, callback) {
          var img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function () {
            var canvas = document.createElement('canvas');
            canvas.width = SIZE;
            canvas.height = SIZE;
            var ctx = canvas.getContext('2d');

            // Clip to a circle
            ctx.beginPath();
            ctx.arc(SIZE / 2, SIZE / 2, SIZE / 2, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();

            // Draw image scaled to fill the circle
            ctx.drawImage(img, 0, 0, SIZE, SIZE);

            callback(canvas.toDataURL('image/png'));
          };
          img.onerror = function () {
            // Fall back to original if load fails
            callback(imgSrc);
          };
          img.src = imgSrc;
        }

        function updateFavicon() {
          var html  = document.documentElement;
          var isDark =
            html.classList.contains('dark') ||
            html.getAttribute('data-theme') === 'night' ||
            window.matchMedia('(prefers-color-scheme: dark)').matches;

          // Dark themes → white logo; light themes → black logo
          var src = isDark ? '/readablelogoblack.png' : '/readablelogowhite.png';

          makeFaviconUrl(src, function (dataUrl) {
            // Remove existing favicons
            var existing = document.querySelectorAll('link[rel="icon"]');
            existing.forEach(function (el) { el.parentNode && el.parentNode.removeChild(el); });

            var link = document.createElement('link');
            link.rel  = 'icon';
            link.type = 'image/png';
            link.href = dataUrl;
            document.head.appendChild(link);
          });
        }

        // Re-run whenever the theme class/attribute changes
        var observer = new MutationObserver(updateFavicon);
        observer.observe(document.documentElement, {
          attributes: true,
          attributeFilter: ['class', 'data-theme'],
        });

        // Initial call — wait for DOM so the canvas API is available
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', updateFavicon);
        } else {
          updateFavicon();
        }
      })();
    </script>
  </head>
  <body class="font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
